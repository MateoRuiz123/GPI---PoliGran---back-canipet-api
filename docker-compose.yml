services:
  postgres:
    image: postgres:16-alpine
    container_name: gpi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gpi_user
      POSTGRES_PASSWORD: gpi_pass
      POSTGRES_DB: gpi_db
    ports:
      - '5432:5432'
    volumes:
      - gpi_pg_data:/var/lib/postgresql/data

volumes:
  gpi_pg_data:
